<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PACMAN ARCADE - Clásico Original</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #030318, #010108);
      font-family: 'Courier New', 'Press Start 2P', 'VT323', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    /* CONTENEDOR PRINCIPAL ESTILO ARCADE */
    .arcade-machine {
      background: #0a0a1a;
      border-radius: 32px;
      box-shadow: 0 25px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 20px 25px 25px 25px;
      border: 2px solid #2b2b5e;
    }

    /* PANEL SUPERIOR (1UP / HIGH SCORE / LEVEL) */
    .arcade-header {
      background: #000000aa;
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 12px 25px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 20px;
      border-bottom: 3px solid #ffc107;
      box-shadow: 0 0 10px #ffc10755;
    }

    .score-panel {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }

    .score-block {
      text-align: center;
    }

    .score-label {
      font-size: 1rem;
      letter-spacing: 2px;
      color: #ffd966;
      text-shadow: 0 0 3px #ffae00;
      font-weight: bold;
    }

    .score-value {
      font-size: 2.2rem;
      font-weight: bold;
      font-family: 'Courier New', 'VT323', monospace;
      background: #000;
      padding: 4px 12px;
      border-radius: 12px;
      color: #ffde6e;
      text-shadow: 0 0 6px #ffb300;
      letter-spacing: 4px;
      line-height: 1;
      margin-top: 6px;
      border: 1px solid #ffc107;
    }

    .level-indicator {
      background: #1e1e3c;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: bold;
      color: #ffcf4a;
      border: 1px solid #ffb347;
      text-align: center;
    }

    .level-indicator span {
      font-size: 1.8rem;
      font-weight: bold;
      margin-left: 8px;
      color: #ffeeaa;
    }

    /* CONTENEDOR DEL CANVAS + OVERLAY READY! */
    .canvas-area {
      display: flex;
      justify-content: center;
      position: relative;
    }

    .canvas-wrapper {
      position: relative;
      display: inline-block;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      box-shadow: 0 0 0 4px #0b0b2e, 0 10px 30px rgba(0,0,0,0.7);
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      background-color: black;
    }

    .ready-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
    }

    .ready-text {
      font-family: 'Courier New', 'Press Start 2P', monospace;
      font-size: 2rem;
      font-weight: bold;
      background: rgba(0,0,0,0.7);
      padding: 12px 24px;
      border-radius: 40px;
      color: #ffff99;
      text-shadow: 0 0 12px #ffcc33;
      letter-spacing: 6px;
      border: 2px solid #ffdd77;
      backdrop-filter: blur(4px);
      animation: pulseReady 0.8s infinite alternate;
    }

    @keyframes pulseReady {
      0% { opacity: 0.7; text-shadow: 0 0 0px #ffcc33; transform: scale(0.98);}
      100% { opacity: 1; text-shadow: 0 0 12px #ffaa22; transform: scale(1.02);}
    }

    /* PANEL DE INFORMACIÓN LATERAL (mejorado) */
    .info-sidebar {
      background: rgba(8, 8, 24, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 18px;
      min-width: 220px;
      border: 1px solid rgba(255, 200, 100, 0.4);
    }

    .game-features {
      list-style: none;
      margin: 15px 0;
    }

    .game-features li {
      margin: 12px 0;
      font-size: 0.75rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #dddaff;
    }

    .game-features li::before {
      content: "🍒";
      font-size: 0.9rem;
    }

    .lives-arcade {
      background: #00000066;
      border-radius: 30px;
      padding: 8px;
      text-align: center;
      margin: 15px 0;
    }

    .lives-icons {
      font-size: 1.7rem;
      letter-spacing: 6px;
      color: #ffd966;
    }

    button {
      background: #f0b429;
      border: none;
      font-family: monospace;
      font-weight: bold;
      font-size: 1rem;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.1s linear;
      width: 100%;
      margin-top: 10px;
      color: #1e1a2f;
    }

    button:hover {
      background: #ffcd5c;
      transform: scale(0.98);
      box-shadow: 0 0 10px #ffcc44;
    }

    .status-message {
      background: #010116;
      border-radius: 30px;
      padding: 8px;
      font-size: 0.7rem;
      text-align: center;
      font-weight: bold;
      margin-top: 12px;
      border-left: 4px solid gold;
    }

    footer {
      text-align: center;
      font-size: 0.65rem;
      margin-top: 20px;
      color: #9aa9ff;
    }
  </style>
</head>
<body>
<div class="arcade-machine">
  <!-- HEADER CLÁSICO ARCADE: 1UP / HIGH SCORE / LEVEL -->
  <div class="arcade-header">
    <div class="score-panel">
      <div class="score-block">
        <div class="score-label">1UP</div>
        <div class="score-value" id="oneUpScore">00</div>
      </div>
      <div class="score-block">
        <div class="score-label">HIGH SCORE</div>
        <div class="score-value" id="highScoreDisplay">00</div>
      </div>
    </div>
    <div class="level-indicator">
      🌟 LEVEL <span id="levelDisplayArcade">1</span>
    </div>
  </div>

  <!-- CANVAS + READY OVERLAY -->
  <div class="canvas-area">
    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="336" height="368"></canvas>
      <div id="readyOverlay" class="ready-overlay" style="display: none;">
        <div class="ready-text">READY!</div>
      </div>
    </div>
  </div>

  <!-- PANEL LATERAL CON CONTROLES Y VIDA -->
  <div style="display: flex; gap: 18px; margin-top: 20px; flex-wrap: wrap; justify-content: center;">
    <div class="info-sidebar" style="flex:1;">
      <h3 style="margin:0 0 8px 0; color:#ffcf4a;">⚙️ POWER-UP</h3>
      <ul class="game-features">
        <li>3 mapas clásicos originales</li>
        <li>Power Pellets (fantasmas azules)</li>
        <li>Velocidad + dificultad por nivel</li>
        <li>10.000 pts → ❤️ extra</li>
      </ul>
      <div class="lives-arcade">
        <div style="font-size:0.7rem;">VIDAS</div>
        <div class="lives-icons" id="livesIcons">❤️❤️❤️</div>
      </div>
      <div class="status-message" id="gameStatusMsg">
        🟡 READY!
      </div>
      <button id="resetGameBtn">🔄 REINICIAR PARTIDA</button>
      <div style="font-size: 0.65rem; text-align: center; margin-top: 12px;">
        🕹️ ←↑↓→  o  WASD | R = Reinicio rápido
      </div>
    </div>
  </div>
  <footer>⭐ CLÁSICO ORIGINAL ARCADE - 3 NIVELES PROGRESIVOS ⭐</footer>
</div>

<script>
  (function(){
    // ---------- CONFIGURACIÓN ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const TILE = 16;
    const COLS = 21;
    const ROWS = 23;
    
    // Elementos DOM
    const oneUpSpan = document.getElementById('oneUpScore');
    const highScoreSpan = document.getElementById('highScoreDisplay');
    const levelArcadeSpan = document.getElementById('levelDisplayArcade');
    const livesIconsDiv = document.getElementById('livesIcons');
    const gameStatusSpan = document.getElementById('gameStatusMsg');
    const readyOverlayDiv = document.getElementById('readyOverlay');
    
    // Variables de velocidad por nivel
    let PAC_SPEED = 1.2;
    let GHOST_SPEED = 0.8;
    let GHOST_FRIGHTENED_SPEED = 0.6;
    
    // HIGH SCORE persistente
    let highScore = 0;
    try {
      const saved = localStorage.getItem('pacman_highscore');
      if(saved && !isNaN(parseInt(saved))) highScore = parseInt(saved);
    } catch(e) { /* silencio */ }
    highScoreSpan.textContent = String(highScore).padStart(2,'0');
    
    // ========== MAPAS ORIGINALES ==========
    const map1 = [
      "111111111111111111111",
      "100000000000000000001",
      "101111011111111011101",
      "121000010000001000121",
      "101011011011011011001",
      "100000010000010000001",
      "101101011101011101101",
      "100001000001000000001",
      "111101011111011101111",
      "100000000000000000001",
      "101111011011011111001",
      "100001000001000000001",
      "101101111101111101101",
      "100000010000010000001",
      "111011011011011011111",
      "100001000001000000001",
      "101101011101011101101",
      "121000010000010000121",
      "101111011111011111001",
      "100000000000000000001",
      "111111101111101111111",
      "122222222222222222221",
      "111111111111111111111"
    ];
    const map2 = [
      "111111111111111111111",
      "100000000000000000001",
      "101111011101110111101",
      "101000010001000100001",
      "121011011011011011121",
      "100000000000000000001",
      "101101110111011101101",
      "100001000001000100001",
      "111101011111011101111",
      "100000000000000000001",
      "101110111011101110101",
      "100000100000001000001",
      "101101111101111101101",
      "100001000001000100001",
      "111011011011011011111",
      "100000010000010000001",
      "101101110111011101101",
      "121000000000000000121",
      "101111011111011111001",
      "100000000000000000001",
      "111111101111101111111",
      "122222222222222222221",
      "111111111111111111111"
    ];
    const map3 = [
      "111111111111111111111",
      "100000000000000000001",
      "101110111111011101101",
      "101000100000100010001",
      "121011101101110111121",
      "100000001000000000001",
      "111101110111011101111",
      "100001000000000100001",
      "101101111111111101101",
      "100000000000000000001",
      "101111011101110111101",
      "100001000100010000001",
      "111101110101011101111",
      "100000000101000000001",
      "101111011101110111101",
      "100001000000000100001",
      "101101111111111101101",
      "121000000000000000121",
      "101111011111011111001",
      "100000000000000000001",
      "111111101111101111111",
      "122222222222222222221",
      "111111111111111111111"
    ];
    const maps = [map1, map2, map3];
    let currentLevel = 0;
    let mapMatrix = [];
    
    // Datos del juego
    let dots = [];
    let powerPellets = [];
    let score = 0;
    let lives = 3;
    let running = true;
    let levelComplete = false;
    let frightenedMode = false;
    let frightenedTimer = 0;
    const FRIGHTENED_DURATION = 8000;
    let extraLifeGiven = false;
    let flashTimer = 0;
    let isFlashing = false;
    
    // ----- READY! PAUSA CLÁSICA -----
    let readyActive = false;
    let readyTimerMs = 0;
    
    // ---------- PACMAN ----------
    const pac = {
      x: 10, y: 15,
      px: 10 * TILE + TILE/2,
      py: 15 * TILE + TILE/2,
      dir: {x: 0, y: -1},
      mouth: 0,
      radius: 6
    };
    let inputDirection = {x: 0, y: -1};
    
    // ---------- CLASE FANTASMA ----------
    class Ghost {
      constructor(x, y, color) {
        this.startX = x;
        this.startY = y;
        this.x = x;
        this.y = y;
        this.px = x * TILE + TILE/2;
        this.py = y * TILE + TILE/2;
        this.dir = {x: 1, y: 0};
        this.originalColor = color;
        this.color = color;
        this.radius = 6;
        this.frightened = false;
      }
      
      getValidDirections() {
        const valid = [];
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        for(const d of dirs){
          const nx = this.x + d[0];
          const ny = this.y + d[1];
          if(!isWall(nx, ny)) valid.push({x: d[0], y: d[1]});
        }
        return valid;
      }
      
      setFrightened(enabled) {
        this.frightened = enabled;
        this.color = enabled ? '#6b6bff' : this.originalColor;
      }
      
      respawn() {
        this.x = this.startX;
        this.y = this.startY;
        this.px = this.x * TILE + TILE/2;
        this.py = this.y * TILE + TILE/2;
        this.dir = {x: 1, y: 0};
        this.setFrightened(false);
      }
      
      update() {
        if(readyActive) return;
        const speed = this.frightened ? GHOST_FRIGHTENED_SPEED : GHOST_SPEED;
        const centerX = this.x * TILE + TILE/2;
        const centerY = this.y * TILE + TILE/2;
        const isCentered = Math.abs(this.px - centerX) < 1 && Math.abs(this.py - centerY) < 1;
        
        if(isCentered) {
          let validDirs = this.getValidDirections();
          if(validDirs.length){
            const opposite = {x: -this.dir.x, y: -this.dir.y};
            let possible = validDirs.filter(d => !(d.x === opposite.x && d.y === opposite.y));
            if(possible.length === 0) possible = validDirs;
            if(this.frightened) {
              this.dir = possible[Math.floor(Math.random() * possible.length)];
            } else {
              possible.sort((a,b)=>{
                const da = Math.abs(this.x + a.x - pac.x) + Math.abs(this.y + a.y - pac.y);
                const db = Math.abs(this.x + b.x - pac.x) + Math.abs(this.y + b.y - pac.y);
                return da - db;
              });
              this.dir = possible[0];
            }
          }
        }
        
        const nextX = this.px + this.dir.x * speed;
        const nextY = this.py + this.dir.y * speed;
        if(canMoveTo(this.px, this.py, this.dir.x * speed, this.dir.y * speed, this.radius)) {
          this.px = nextX;
          this.py = nextY;
          this.x = Math.floor(this.px / TILE);
          this.y = Math.floor(this.py / TILE);
        } else {
          this.px = centerX;
          this.py = centerY;
        }
      }
    }
    
    let ghosts = [];
    
    // funciones auxiliares de mapa
    function loadMap(levelIdx){
      mapMatrix = maps[levelIdx].map(row => row.split('').map(ch => parseInt(ch)));
    }
    
    function isWall(tx, ty){
      if(tx<0 || tx>=COLS || ty<0 || ty>=ROWS) return true;
      return mapMatrix[ty][tx] === 1 || mapMatrix[ty][tx] === 3;
    }
    
    function canMoveTo(px, py, dx, dy, rad){
      const newX = px + dx;
      const newY = py + dy;
      const checks = [
        {x: newX - rad, y: newY}, {x: newX + rad, y: newY},
        {x: newX, y: newY - rad}, {x: newX, y: newY + rad}
      ];
      for(let c of checks){
        if(isWall(Math.floor(c.x/TILE), Math.floor(c.y/TILE))) return false;
      }
      return true;
    }
    
    function resetDotsAndPower() {
      dots = [];
      powerPellets = [];
      loadMap(currentLevel);
      for(let y=0; y<ROWS; y++){
        dots[y]=[];
        for(let x=0; x<COLS; x++){
          if(mapMatrix[y][x] === 0){
            dots[y][x] = true;
          } else if(mapMatrix[y][x] === 2){
            dots[y][x] = false;
            powerPellets.push({x:x, y:y, active: true});
          } else {
            dots[y][x] = false;
          }
        }
      }
    }
    
    function initGhosts(){
      ghosts = [
        new Ghost(10, 9, '#ff5b5b'),
        new Ghost(9, 9, '#5bd6ff'),
        new Ghost(11, 9, '#ffb36b'),
        new Ghost(10, 10, '#ff69b4')
      ];
    }
    
    function resetPacmanPos(){
      pac.x = 10; pac.y = 15;
      pac.px = 10 * TILE + TILE/2;
      pac.py = 15 * TILE + TILE/2;
      pac.dir = {x:0, y:-1};
      inputDirection = {x:0, y:-1};
    }
    
    function updateUI(){
      oneUpSpan.textContent = String(score).padStart(2,'0');
      if(score > highScore){
        highScore = score;
        highScoreSpan.textContent = String(highScore).padStart(2,'0');
        localStorage.setItem('pacman_highscore', highScore);
      }
      levelArcadeSpan.textContent = currentLevel+1;
      let hearts = '';
      for(let i=0;i<lives;i++) hearts += '❤️ ';
      livesIconsDiv.innerHTML = hearts.trim() || '💀';
    }
    
    function checkExtraLife(){
      if(!extraLifeGiven && score >= 10000){
        lives++;
        extraLifeGiven = true;
        gameStatusSpan.innerHTML = '⭐ ¡VIDA EXTRA! ⭐';
        setTimeout(()=>{ if(running && !levelComplete) gameStatusSpan.innerHTML='🟡 EN JUEGO'; }, 1500);
        updateUI();
      }
    }
    
    function eatDotAt(tx, ty){
      if(dots[ty] && dots[ty][tx]){
        dots[ty][tx]=false;
        score +=10;
        updateUI();
        checkExtraLife();
        return true;
      }
      return false;
    }
    
    function eatPowerPelletAt(tx, ty){
      for(let p of powerPellets){
        if(p.active && p.x===tx && p.y===ty){
          p.active=false;
          score+=50;
          updateUI();
          checkExtraLife();
          // activar modo asustado
          frightenedMode = true;
          frightenedTimer = FRIGHTENED_DURATION;
          for(let g of ghosts) g.setFrightened(true);
          return true;
        }
      }
      return false;
    }
    
    function activateFrightenedMode() {
      frightenedMode = true;
      frightenedTimer = FRIGHTENED_DURATION;
      for(let g of ghosts) g.setFrightened(true);
    }
    
    function updatePacmanMovement(){
      if(readyActive) return;
      const tileX = Math.floor(pac.px / TILE);
      const tileY = Math.floor(pac.py / TILE);
      const centerX = tileX * TILE + TILE/2;
      const centerY = tileY * TILE + TILE/2;
      const centered = Math.abs(pac.px - centerX) < 1 && Math.abs(pac.py - centerY) < 1;
      if(centered){
        if(inputDirection.x !==0 || inputDirection.y!==0){
          const newX = tileX + inputDirection.x;
          const newY = tileY + inputDirection.y;
          if(!isWall(newX, newY)){
            pac.dir = {x: inputDirection.x, y: inputDirection.y};
          }
        }
      }
      const nextX = pac.px + pac.dir.x * PAC_SPEED;
      const nextY = pac.py + pac.dir.y * PAC_SPEED;
      if(canMoveTo(pac.px, pac.py, pac.dir.x * PAC_SPEED, pac.dir.y * PAC_SPEED, pac.radius)){
        pac.px = nextX;
        pac.py = nextY;
      } else {
        pac.px = centerX;
        pac.py = centerY;
      }
      pac.x = Math.floor(pac.px / TILE);
      pac.y = Math.floor(pac.py / TILE);
      pac.mouth += 0.12;
    }
    
    function loseLife(){
      if(!running || levelComplete) return;
      lives--;
      updateUI();
      if(lives <= 0){
        running = false;
        gameStatusSpan.innerHTML = '💀 GAME OVER 💀';
        readyOverlayDiv.style.display = 'none';
        return;
      }
      // reiniciar posiciones SIN perder nivel actual
      resetPacmanPos();
      initGhosts();
      frightenedMode = false;
      frightenedTimer = 0;
      // activar estado READY! clásico
      startReadyMode(900);
      gameStatusSpan.innerHTML = '💔 VIDA PERDIDA';
      setTimeout(()=>{ if(running && !levelComplete) gameStatusSpan.innerHTML='🟡 EN JUEGO'; }, 1200);
    }
    
    function startReadyMode(durationMs=850){
      if(levelComplete || !running) return;
      readyActive = true;
      readyTimerMs = durationMs;
      readyOverlayDiv.style.display = 'flex';
    }
    
    function nextLevelTransition(){
      currentLevel++;
      if(currentLevel >= maps.length){
        running = false;
        gameStatusSpan.innerHTML = '👑 ¡CAMPEÓN! JUEGO COMPLETADO 👑';
        readyOverlayDiv.style.display = 'none';
        levelComplete = false;
        return;
      }
      // Aumentar velocidad
      PAC_SPEED = 1.2 + (currentLevel * 0.2);
      GHOST_SPEED = 0.8 + (currentLevel * 0.15);
      GHOST_FRIGHTENED_SPEED = 0.6 + (currentLevel * 0.1);
      
      resetDotsAndPower();
      resetPacmanPos();
      initGhosts();
      extraLifeGiven = false;
      levelComplete = false;
      isFlashing = false;
      running = true;
      frightenedMode = false;
      startReadyMode(850);
      gameStatusSpan.innerHTML = `🌟 NIVEL ${currentLevel+1} 🌟`;
      setTimeout(()=>{ if(running) gameStatusSpan.innerHTML='🟡 EN JUEGO'; }, 1500);
      updateUI();
    }
    
    function updateGame(deltaTime){
      if(!running || levelComplete) return;
      
      // MANEJO READY!
      if(readyActive){
        readyTimerMs -= deltaTime;
        if(readyTimerMs <= 0){
          readyActive = false;
          readyOverlayDiv.style.display = 'none';
        } else {
          return; // Congelar todo el juego
        }
      }
      
      if(frightenedMode){
        frightenedTimer -= deltaTime;
        if(frightenedTimer <= 0){
          frightenedMode = false;
          for(let g of ghosts) g.setFrightened(false);
        }
      }
      
      updatePacmanMovement();
      eatDotAt(pac.x, pac.y);
      eatPowerPelletAt(pac.x, pac.y);
      
      for(let g of ghosts) g.update();
      
      // Verificar fin de nivel (sin puntos)
      let remainingDots = 0;
      for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) if(dots[y] && dots[y][x]) remainingDots++;
      let remainingPower = powerPellets.filter(p=>p.active).length;
      if(remainingDots===0 && remainingPower===0){
        levelComplete = true;
        isFlashing = true;
        flashTimer = 0;
        gameStatusSpan.innerHTML = '🏆 ¡NIVEL COMPLETADO! 🏆';
        readyOverlayDiv.style.display = 'none';
        setTimeout(()=>{
          nextLevelTransition();
        }, 2500);
        return;
      }
      
      // Colisiones fantasmas
      for(let g of ghosts){
        const dx = Math.abs(g.px - pac.px);
        const dy = Math.abs(g.py - pac.py);
        const dist = Math.hypot(dx,dy);
        if(dist < (pac.radius + g.radius - 2)){
          if(g.frightened){
            score += 200;
            updateUI();
            g.respawn();
            checkExtraLife();
          } else {
            loseLife();
            if(lives<=0) running=false;
            break;
          }
        }
      }
    }
    
    // ---------------------- DIBUJO ----------------------
    function draw(){
      if(isFlashing){
        flashTimer++;
        if(Math.floor(flashTimer/12)%2 ===0){
          ctx.fillStyle='white';
          ctx.fillRect(0,0,TILE*COLS,TILE*ROWS);
          return;
        }
      }
      ctx.fillStyle='#000';
      ctx.fillRect(0,0,TILE*COLS,TILE*ROWS);
      
      // paredes
      for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
          if(mapMatrix[y][x]===1){
            ctx.fillStyle = isFlashing ? `hsl(${flashTimer*8%360},80%,55%)` : '#2121ff';
            ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
          }
        }
      }
      // puntos
      if(!isFlashing){
        ctx.fillStyle = '#ffd966';
        for(let y=0;y<ROWS;y++){
          for(let x=0;x<COLS;x++){
            if(dots[y] && dots[y][x]){
              ctx.beginPath();
              ctx.arc(x*TILE+8, y*TILE+8, 2,0,Math.PI*2);
              ctx.fill();
            }
          }
        }
        for(let p of powerPellets){
          if(p.active){
            const pulse = Math.sin(Date.now()*0.005)*1.5;
            ctx.fillStyle='#ffaa44';
            ctx.beginPath();
            ctx.arc(p.x*TILE+8, p.y*TILE+8, 6+pulse, 0, Math.PI*2);
            ctx.fill();
          }
        }
      }
      
      // Pacman
      if(running || levelComplete){
        const angleOpen = 0.3 + Math.abs(Math.sin(pac.mouth))*0.3;
        let angle=0;
        if(pac.dir.x===1) angle=0;
        else if(pac.dir.x===-1) angle=Math.PI;
        else if(pac.dir.y===-1) angle=-Math.PI/2;
        else if(pac.dir.y===1) angle=Math.PI/2;
        ctx.fillStyle='#ffd400';
        ctx.beginPath();
        ctx.arc(pac.px, pac.py, pac.radius, angle+angleOpen, angle+2*Math.PI-angleOpen);
        ctx.lineTo(pac.px, pac.py);
        ctx.fill();
        ctx.fillStyle='black';
        ctx.beginPath();
        ctx.arc(pac.px+(pac.dir.x*3), pac.py+(pac.dir.y*3)-2, 2,0,Math.PI*2);
        ctx.fill();
      }
      
      // fantasmas
      for(let g of ghosts){
        ctx.save();
        ctx.translate(g.px, g.py);
        let color = g.color;
        if(g.frightened && frightenedTimer<2000){
          color = (Math.floor(Date.now()/200)%2===0) ? '#fff' : '#8b8bff';
        }
        ctx.fillStyle=color;
        ctx.beginPath();
        ctx.arc(0, -2, g.radius, Math.PI, 0);
        ctx.lineTo(g.radius, g.radius);
        for(let i=0;i<4;i++){
          let wx = g.radius - (i*g.radius/2);
          ctx.quadraticCurveTo(wx-g.radius/4, g.radius+2, wx-g.radius/2, g.radius);
        }
        ctx.lineTo(-g.radius, -2);
        ctx.fill();
        ctx.fillStyle='white';
        ctx.beginPath();
        ctx.arc(-2, -2, 2, 0,Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(3, -2, 2, 0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle=g.frightened?'black':'#00f';
        ctx.beginPath();
        ctx.arc(-2 + g.dir.x, -2 + g.dir.y, 1, 0,Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(3 + g.dir.x, -2 + g.dir.y, 1, 0,Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }
    
    // ---------- RESET TOTAL ----------
    function fullReset(){
      currentLevel = 0;
      PAC_SPEED = 1.2;
      GHOST_SPEED = 0.8;
      GHOST_FRIGHTENED_SPEED = 0.6;
      score = 0;
      lives = 3;
      extraLifeGiven = false;
      levelComplete = false;
      isFlashing = false;
      flashTimer = 0;
      frightenedMode = false;
      running = true;
      resetDotsAndPower();
      resetPacmanPos();
      initGhosts();
      updateUI();
      startReadyMode(900);
      gameStatusSpan.innerHTML = '🟡 READY!';
      readyOverlayDiv.style.display = 'flex';
    }
    
    // Controles
    function handleKey(e){
      const key = e.key;
      if(key==='ArrowUp'||key==='w'||key==='W'){ inputDirection={x:0,y:-1}; e.preventDefault(); }
      else if(key==='ArrowDown'||key==='s'||key==='S'){ inputDirection={x:0,y:1}; e.preventDefault(); }
      else if(key==='ArrowLeft'||key==='a'||key==='A'){ inputDirection={x:-1,y:0}; e.preventDefault(); }
      else if(key==='ArrowRight'||key==='d'||key==='D'){ inputDirection={x:1,y:0}; e.preventDefault(); }
      if(key==='r'||key==='R'){ fullReset(); e.preventDefault(); }
    }
    window.addEventListener('keydown', handleKey);
    document.getElementById('resetGameBtn').addEventListener('click', fullReset);
    
    // Game Loop con delta time
    let lastTimestamp = 0;
    function gameLoop(now){
      requestAnimationFrame(gameLoop);
      if(!lastTimestamp){ lastTimestamp = now; return; }
      let delta = Math.min(60, now - lastTimestamp);
      lastTimestamp = now;
      if(running && !levelComplete){
        updateGame(delta);
      }
      draw();
    }
    
    // INICIALIZACIÓN
    fullReset();
    requestAnimationFrame(gameLoop);
  })();
</script>
