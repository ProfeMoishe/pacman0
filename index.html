<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PAC-MAN ARCADE CLÁSICO</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', 'VT323', 'Monaco', monospace;
      margin: 0;
      padding: 20px;
    }

    /* Contenedor estilo arcade */
    .arcade-cabinet {
      background: #000;
      border-radius: 20px;
      padding: 20px 25px 25px 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
      border: 2px solid #ffcc33;
    }

    .game-wrapper {
      text-align: center;
      background: #000000;
      padding: 5px;
    }

    /* Panel superior estilo clásico: 1UP   HIGH   SCORE */
    .score-panel {
      background: #000;
      padding: 8px 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: 'Courier New', 'VT323', monospace;
      font-weight: bold;
      letter-spacing: 2px;
      border-bottom: 2px solid #ffcc33;
      border-top: 2px solid #ffcc33;
    }

    .score-section {
      text-align: center;
      color: #ffd966;
      text-shadow: 0 0 4px #ffaa33;
      background: #010101;
      padding: 5px 12px;
      border-radius: 6px;
    }

    .score-label {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffcc44;
      letter-spacing: 1px;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: bold;
      background: #000;
      padding: 0 6px;
      color: #ffdd88;
      font-family: monospace;
      line-height: 1;
    }

    .lives-area {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #000000aa;
      padding: 6px 16px;
      border-radius: 40px;
      margin-top: 6px;
      justify-content: center;
    }

    .lives-icons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pac-live {
      font-size: 1.5rem;
      filter: drop-shadow(0 0 2px gold);
    }

    canvas {
      display: block;
      margin: 0 auto;
      box-shadow: 0 0 0 4px #ffcc33, 0 10px 25px rgba(0,0,0,0.5);
      background: #000;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    .controls-info {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 20px;
      color: #ffcc77;
      font-size: 0.8rem;
      font-family: monospace;
      font-weight: bold;
    }

    button {
      background: #ffcc33;
      border: none;
      color: #000;
      font-family: monospace;
      font-weight: bold;
      font-size: 1rem;
      padding: 6px 18px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.1s linear;
      box-shadow: 0 2px 0 #aa7a22;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    .reset-btn {
      background: #ffaa33;
      color: #1f1f1f;
    }

    .status-msg {
      font-family: monospace;
      font-size: 0.9rem;
      background: #111;
      padding: 4px 10px;
      border-radius: 20px;
      color: #ffcc66;
    }
  </style>
</head>
<body>
<div class="arcade-cabinet">
  <div class="game-wrapper">
    <!-- Panel clásico: 1UP | HIGH | SCORE (igual a imagen) -->
    <div class="score-panel">
      <div class="score-section">
        <div class="score-label">1UP</div>
        <div class="score-value" id="oneUpScore">00</div>
      </div>
      <div class="score-section">
        <div class="score-label">HIGH</div>
        <div class="score-value" id="highScoreDisplay">00</div>
      </div>
      <div class="score-section">
        <div class="score-label">SCORE</div>
        <div class="score-value" id="currentScoreDisplay">00</div>
      </div>
    </div>

    <canvas id="gameCanvas" width="448" height="496"></canvas>

    <div class="lives-area">
      <span style="color:#ffcc66;">✧ LIVES ✧</span>
      <div class="lives-icons" id="livesIconsContainer"></div>
      <button id="resetGameBtn" class="reset-btn">🔄 RESET</button>
    </div>
    <div class="controls-info">
      <span>◀  ▲  ▼  ▶</span>  <span>o WASD</span>  <span>R = Reiniciar</span>
    </div>
    <div class="status-msg" id="gameStatusMsg"> READY! </div>
  </div>
</div>

<script>
  (function(){
    // -------------------- CONFIGURACIÓN ARCADE CLÁSICA --------------------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const TILE = 16;
    const COLS = 28;
    const ROWS = 31;

    // Velocidades base (se incrementan por nivel)
    let PAC_SPEED = 1.28;
    let GHOST_SPEED = 0.82;
    let GHOST_FRIGHTENED_SPEED = 0.6;

    // ----- MAPA CLÁSICO ORIGINAL (IDENTICO AL ESCENARIO DE LA IMAGEN) -----
    // Representación fiel del laberinto de Pac-Man Arcade (con túneles, power-pellets en esquinas)
    // 0 = punto, 1 = pared, 2 = power pellet, 9 = pasillo vacío (sin puntos)
    const CLASSIC_MAZE_RAW = [
      "1111111111111111111111111111",
      "1000000000000110000000000001",
      "1011110111110110111110111101",
      "1211110111110110111110111121",
      "1011110111110110111110111101",
      "1000000000000000000000000001",
      "1011110110111111110110111101",
      "1011110110111111110110111101",
      "1000000110000110000110000001",
      "1111110111119119111110111111",
      "9999910119999999999110199999",
      "9999910119111991119110199999",
      "1111110119199999919110111111",
      "9999990999199999919990999999",
      "1111110119199999919110111111",
      "9999910119111111119110199999",
      "9999910119999999999110199999",
      "9999910119111111119110199999",
      "1111110119111111119110111111",
      "1000000000000110000000000001",
      "1011110111110110111110111101",
      "1011110111110110111110111101",
      "1200110000000990000000110021",
      "1110110110111111110110110111",
      "1110110110111111110110110111",
      "1000000110000110000110000001",
      "1011111111110110111111111101",
      "1011111111110110111111111101",
      "1000000000000000000000000001",
      "1111111111111111111111111111",
      "9999999999999999999999999999"
    ];

    // Convertir el mapa estático a matriz numérica
    let baseMazeMatrix = [];
    for (let i = 0; i < ROWS; i++) {
      baseMazeMatrix.push(CLASSIC_MAZE_RAW[i].split('').map(ch => parseInt(ch)));
    }

    // Mapas: todos los niveles usan el mismo escenario idéntico a la imagen
    // Solo cambia el color de las paredes entre niveles
    const maps = [baseMazeMatrix, baseMazeMatrix, baseMazeMatrix];
    let currentLevel = 0;
    let currentMap = [];

    // Colores de paredes que cambian por nivel (entre niveles cambia)
    const WALL_COLORS = [
      '#2121ff',   // Nivel 1: Azul clásico
      '#30b830',   // Nivel 2: Verde brillante
      '#d43d6b',   // Nivel 3: Rosa carmesí
      '#ffaa33',   // Nivel 4 (por si hay más): dorado (pero solo 3 niveles)
    ];

    // Variables globales del juego
    let dots = [];          // matriz de booleanos (puntos)
    let powerPellets = [];  // lista de {x, y, active}
    let score = 0;
    let highScore = 0;
    let lives = 3;
    let running = true;
    let levelComplete = false;
    let readyMode = true;       // Modo "READY!" (pausa inicial / entre muertes)
    let readyTimer = 0;
    const READY_DURATION = 2000; // 2 segundos

    let frightenedMode = false;
    let frightenedTimer = 0;
    const FRIGHTENED_DURATION = 7000;

    let extraLifeGiven = false;
    let flashWin = false;
    let flashCounter = 0;
    
    // Datos Pac-Man
    const PAC_START_X = 13;
    const PAC_START_Y = 22;
    const pac = {
      x: PAC_START_X, y: PAC_START_Y,
      px: PAC_START_X * TILE + TILE/2,
      py: PAC_START_Y * TILE + TILE/2,
      dir: {x:0, y:-1},
      mouth: 0,
      radius: 6
    };
    let inputDir = {x:0, y:-1};

    // ----- Fantasmas con posiciones clásicas -----
    class Ghost {
      constructor(startX, startY, colorName) {
        this.startX = startX;
        this.startY = startY;
        this.x = startX;
        this.y = startY;
        this.px = startX * TILE + TILE/2;
        this.py = startY * TILE + TILE/2;
        this.dir = {x: 1, y: 0};
        this.originalColor = colorName;
        this.color = colorName;
        this.radius = 6;
        this.frightened = false;
      }

      getValidDirections() {
        const valid = [];
        const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
        for(const d of dirs) {
          const nx = this.x + d.x;
          const ny = this.y + d.y;
          if(!isWallTile(nx, ny)) valid.push(d);
        }
        return valid;
      }

      setFrightened(enabled) {
        this.frightened = enabled;
        this.color = enabled ? '#9b9bff' : this.originalColor;
      }

      respawn() {
        this.x = this.startX;
        this.y = this.startY;
        this.px = this.x * TILE + TILE/2;
        this.py = this.y * TILE + TILE/2;
        this.dir = {x: 1, y: 0};
        this.setFrightened(false);
      }

      update() {
        const speed = this.frightened ? GHOST_FRIGHTENED_SPEED : GHOST_SPEED;
        const centerX = this.x * TILE + TILE/2;
        const centerY = this.y * TILE + TILE/2;
        const isCentered = Math.abs(this.px - centerX) < 1.5 && Math.abs(this.py - centerY) < 1.5;

        if(isCentered) {
          const validDirs = this.getValidDirections();
          if(validDirs.length > 0) {
            const opposite = {x: -this.dir.x, y: -this.dir.y};
            let possible = validDirs.filter(d => !(d.x === opposite.x && d.y === opposite.y));
            if(possible.length === 0) possible = validDirs;
            if(this.frightened) {
              this.dir = possible[Math.floor(Math.random() * possible.length)];
            } else {
              // IA clásica: aproximación hacia Pac-Man
              possible.sort((a,b) => {
                const da = Math.abs((this.x + a.x) - pac.x) + Math.abs((this.y + a.y) - pac.y);
                const db = Math.abs((this.x + b.x) - pac.x) + Math.abs((this.y + b.y) - pac.y);
                return da - db;
              });
              this.dir = possible[0];
            }
          }
        }

        const newPx = this.px + this.dir.x * speed;
        const newPy = this.py + this.dir.y * speed;
        if(canMoveToPos(this.px, this.py, this.dir.x * speed, this.dir.y * speed, this.radius)) {
          this.px = newPx;
          this.py = newPy;
          this.x = Math.floor(this.px / TILE);
          this.y = Math.floor(this.py / TILE);
        } else {
          this.px = centerX;
          this.py = centerY;
        }

        // TUNEL WRAP (clásico fila 17)
        if(this.y === 17) {
          if(this.x < 0) { this.x = COLS-1; this.px = this.x * TILE + TILE/2; }
          else if(this.x >= COLS) { this.x = 0; this.px = this.x * TILE + TILE/2; }
        }
      }
    }

    let ghosts = [];

    // Funciones auxiliares mapa
    function isWallTile(tx, ty) {
      if(tx<0 || tx>=COLS || ty<0 || ty>=ROWS) return true;
      const val = currentMap[ty][tx];
      return val === 1 || val === 3;
    }

    function canMoveToPos(px, py, dx, dy, rad) {
      const newX = px + dx;
      const newY = py + dy;
      const corners = [
        {x: newX - rad, y: newY},
        {x: newX + rad, y: newY},
        {x: newX, y: newY - rad},
        {x: newX, y: newY + rad}
      ];
      for(const c of corners) {
        const tileX = Math.floor(c.x / TILE);
        const tileY = Math.floor(c.y / TILE);
        if(isWallTile(tileX, tileY)) return false;
      }
      return true;
    }

    // Inicializar / resetear puntos y power pellets según el mapa actual
    function initDotsAndPower() {
      dots = Array(ROWS).fill().map(() => Array(COLS).fill(false));
      powerPellets = [];
      for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
          const cell = currentMap[y][x];
          if(cell === 0) {
            dots[y][x] = true;
          } else if(cell === 2) {
            dots[y][x] = false;
            powerPellets.push({x, y, active: true});
          } else {
            dots[y][x] = false;
          }
        }
      }
    }

    // Cargar nivel (mismo mapa pero diferente color de pared)
    function loadLevel(levelIndex) {
      currentMap = maps[levelIndex % maps.length];
      initDotsAndPower();
    }

    // Reiniciar posiciones de personajes
    function resetPositions() {
      pac.x = PAC_START_X; pac.y = PAC_START_Y;
      pac.px = PAC_START_X * TILE + TILE/2;
      pac.py = PAC_START_Y * TILE + TILE/2;
      pac.dir = {x:0, y:-1};
      inputDir = {x:0, y:-1};
      pac.mouth = 0;

      ghosts = [
        new Ghost(13, 11, '#ff5b5b'),  // Blinky
        new Ghost(12, 14, '#5bd6ff'),  // Inky
        new Ghost(15, 14, '#ffb36b'),  // Clyde
        new Ghost(13, 14, '#ff69b4')   // Pinky
      ];
      frightenedMode = false;
      frightenedTimer = 0;
      for(let g of ghosts) g.setFrightened(false);
    }

    // Estado READY! (pausa antes de empezar nivel o tras muerte)
    function startReadyState() {
      readyMode = true;
      readyTimer = READY_DURATION;
      document.getElementById('gameStatusMsg').innerHTML = " READY! ";
    }

    // Actualizar UI: score, highscore, 1UP, vidas
    function updateUI() {
      const oneUpElem = document.getElementById('oneUpScore');
      const highElem = document.getElementById('highScoreDisplay');
      const currentScoreElem = document.getElementById('currentScoreDisplay');
      const scoreStr = String(Math.floor(score)).padStart(2,'0').slice(0,8);
      oneUpElem.innerText = scoreStr;
      currentScoreElem.innerText = scoreStr;
      if(score > highScore) {
        highScore = score;
        highElem.innerText = String(highScore).padStart(2,'0').slice(0,8);
      } else {
        highElem.innerText = String(highScore).padStart(2,'0').slice(0,8);
      }
      // mostrar vidas como iconos de pacman
      const livesContainer = document.getElementById('livesIconsContainer');
      livesContainer.innerHTML = '';
      for(let i=0; i<lives; i++) {
        const span = document.createElement('span');
        span.className = 'pac-live';
        span.innerHTML = 'ᗧ';
        span.style.color = '#ffd966';
        span.style.fontSize = '24px';
        span.style.marginRight = '5px';
        livesContainer.appendChild(span);
      }
    }

    // Comprobar vida extra (10000 puntos)
    function checkExtraLife() {
      if(!extraLifeGiven && score >= 10000) {
        lives++;
        extraLifeGiven = true;
        updateUI();
        document.getElementById('gameStatusMsg').innerHTML = "⭐ EXTRA LIFE ⭐";
        setTimeout(() => { if(running && !readyMode) document.getElementById('gameStatusMsg').innerHTML = "▶ GAME"; }, 1500);
      }
    }

    function eatDot(tileX, tileY) {
      if(dots[tileY] && dots[tileY][tileX]) {
        dots[tileY][tileX] = false;
        score += 10;
        updateUI();
        checkExtraLife();
        return true;
      }
      return false;
    }

    function eatPowerPellet(tileX, tileY) {
      for(let p of powerPellets) {
        if(p.active && p.x === tileX && p.y === tileY) {
          p.active = false;
          score += 50;
          updateUI();
          activateFrightenedMode();
          checkExtraLife();
          return true;
        }
      }
      return false;
    }

    function activateFrightenedMode() {
      frightenedMode = true;
      frightenedTimer = FRIGHTENED_DURATION;
      for(let g of ghosts) g.setFrightened(true);
    }

    // Lógica de movimiento Pac-Man
    function updatePacman() {
      const curTileX = Math.floor(pac.px / TILE);
      const curTileY = Math.floor(pac.py / TILE);
      const centerX = curTileX * TILE + TILE/2;
      const centerY = curTileY * TILE + TILE/2;
      const centered = Math.abs(pac.px - centerX) < 1.2 && Math.abs(pac.py - centerY) < 1.2;

      if(centered) {
        if(inputDir.x !==0 || inputDir.y !==0) {
          const newX = curTileX + inputDir.x;
          const newY = curTileY + inputDir.y;
          if(!isWallTile(newX, newY)) {
            pac.dir = {x: inputDir.x, y: inputDir.y};
          }
        }
      }

      const newPx = pac.px + pac.dir.x * PAC_SPEED;
      const newPy = pac.py + pac.dir.y * PAC_SPEED;
      if(canMoveToPos(pac.px, pac.py, pac.dir.x * PAC_SPEED, pac.dir.y * PAC_SPEED, pac.radius)) {
        pac.px = newPx;
        pac.py = newPy;
      } else {
        pac.px = centerX;
        pac.py = centerY;
      }

      pac.x = Math.floor(pac.px / TILE);
      pac.y = Math.floor(pac.py / TILE);
      pac.mouth += 0.13;

      // Túnel lateral (fila 17)
      if(pac.y === 17) {
        if(pac.x < 0) { pac.x = COLS-1; pac.px = pac.x * TILE + TILE/2; }
        else if(pac.x >= COLS) { pac.x = 0; pac.px = pac.x * TILE + TILE/2; }
      }
    }

    // Revisar fin del nivel (sin puntos ni power pellets)
    function checkLevelCompletion() {
      let remainingDots = 0;
      for(let i=0;i<ROWS;i++) {
        for(let j=0;j<COLS;j++) {
          if(dots[i][j]) remainingDots++;
        }
      }
      let remainingPower = powerPellets.filter(p=>p.active).length;
      if(remainingDots === 0 && remainingPower === 0) {
        if(!levelComplete) {
          levelComplete = true;
          flashWin = true;
          flashCounter = 0;
          running = false;
          document.getElementById('gameStatusMsg').innerHTML = "🏆 LEVEL CLEAR! 🏆";
          setTimeout(() => {
            nextLevel();
          }, 2200);
        }
        return true;
      }
      return false;
    }

    function nextLevel() {
      currentLevel++;
      if(currentLevel >= maps.length) {
        // Si supera 3 niveles, se recicla pero con dificultad extra (victoria final ciclo)
        currentLevel = 0; // ciclo pero se mantienen mapas y cambia dificultad y colores
        // Por exigencia entre niveles cambia color, pero seguimos incrementando dificultad
      }
      // Ajuste de velocidad progresiva
      PAC_SPEED = 1.28 + (currentLevel * 0.12);
      GHOST_SPEED = 0.82 + (currentLevel * 0.1);
      GHOST_FRIGHTENED_SPEED = 0.6 + (currentLevel * 0.05);

      loadLevel(currentLevel);
      resetPositions();
      levelComplete = false;
      flashWin = false;
      running = true;
      extraLifeGiven = false;
      startReadyState();
      updateUI();
      document.getElementById('gameStatusMsg').innerHTML = " READY! ";
    }

    // Pérdida de vida
    function loseLife() {
      lives--;
      updateUI();
      if(lives <= 0) {
        running = false;
        levelComplete = false;
        document.getElementById('gameStatusMsg').innerHTML = "💀 GAME OVER 💀";
        return;
      }
      resetPositions();
      startReadyState();
      running = true;   // pero en ready mode no se actualiza movimiento
      frightenedMode = false;
      for(let g of ghosts) g.setFrightened(false);
      document.getElementById('gameStatusMsg').innerHTML = "❤️ -1 LIFE";
      setTimeout(() => {
        if(running && readyMode) document.getElementById('gameStatusMsg').innerHTML = " READY! ";
      }, 1000);
    }

    // Actualización general del juego
    function updateGame() {
      if(!running || levelComplete) return;
      if(readyMode) {
        readyTimer -= 16;
        if(readyTimer <= 0) {
          readyMode = false;
          document.getElementById('gameStatusMsg').innerHTML = "▶ PLAY";
        }
        return;
      }

      // Modo asustado
      if(frightenedMode) {
        frightenedTimer -= 16;
        if(frightenedTimer <= 0) {
          frightenedMode = false;
          for(let g of ghosts) g.setFrightened(false);
        }
      }

      updatePacman();
      eatDot(pac.x, pac.y);
      eatPowerPellet(pac.x, pac.y);

      for(let g of ghosts) g.update();

      // Colisiones
      for(let g of ghosts) {
        const dx = g.px - pac.px;
        const dy = g.py - pac.py;
        const dist = Math.hypot(dx, dy);
        if(dist < pac.radius + g.radius - 2) {
          if(g.frightened) {
            score += 200;
            updateUI();
            g.respawn();
            checkExtraLife();
          } else {
            loseLife();
            if(lives <= 0) running = false;
            return;
          }
        }
      }

      checkLevelCompletion();
    }

    // ---------- DIBUJO ESTILO ARCADE CLÁSICO ----------
    function draw() {
      ctx.clearRect(0, 0, COLS*TILE, ROWS*TILE);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, COLS*TILE, ROWS*TILE);
      
      // Obtener color de pared según nivel actual (cambia entre niveles)
      const wallColor = WALL_COLORS[currentLevel % WALL_COLORS.length];
      
      // Dibujar paredes
      for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
          if(currentMap[y][x] === 1) {
            if(flashWin && (Math.floor(Date.now() / 80) % 2 === 0)) {
              ctx.fillStyle = '#ffffff';
            } else {
              ctx.fillStyle = wallColor;
            }
            ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
          }
        }
      }
      
      // Puntos normales
      if(!flashWin) {
        ctx.fillStyle = '#ffd966';
        for(let y=0; y<ROWS; y++) {
          for(let x=0; x<COLS; x++) {
            if(dots[y] && dots[y][x]) {
              ctx.beginPath();
              ctx.arc(x*TILE+TILE/2, y*TILE+TILE/2, 2.2, 0, Math.PI*2);
              ctx.fill();
            }
          }
        }
      }
      
      // Power pellets
      if(!flashWin) {
        for(let p of powerPellets) {
          if(p.active) {
            const pulse = Math.sin(Date.now() * 0.005) * 1.2;
            ctx.fillStyle = '#ffbb77';
            ctx.beginPath();
            ctx.arc(p.x*TILE+TILE/2, p.y*TILE+TILE/2, 6 + pulse, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ff9900';
            ctx.beginPath();
            ctx.arc(p.x*TILE+TILE/2, p.y*TILE+TILE/2, 4, 0, Math.PI*2);
            ctx.fill();
          }
        }
      }
      
      // Pacman
      if(running || (!readyMode && !levelComplete) || readyMode) {
        const angle = (() => {
          if(pac.dir.x === 1) return 0;
          if(pac.dir.x === -1) return Math.PI;
          if(pac.dir.y === -1) return -Math.PI/2;
          if(pac.dir.y === 1) return Math.PI/2;
          return 0;
        })();
        const mouthOpen = 0.32 + Math.abs(Math.sin(pac.mouth)) * 0.35;
        ctx.fillStyle = '#ffdd44';
        ctx.beginPath();
        ctx.arc(pac.px, pac.py, pac.radius, angle + mouthOpen, angle + Math.PI*2 - mouthOpen);
        ctx.lineTo(pac.px, pac.py);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(pac.px + (pac.dir.x*2.5), pac.py + (pac.dir.y*2.5)-2, 1.8, 0, Math.PI*2);
        ctx.fill();
      }
      
      // Fantasmas
      for(let g of ghosts) {
        ctx.save();
        ctx.translate(g.px, g.py);
        let ghostColor = g.color;
        if(g.frightened && frightenedTimer < 1600 && (Math.floor(Date.now()/120)%2===0)) ghostColor = '#ffffff';
        ctx.fillStyle = ghostColor;
        ctx.beginPath();
        ctx.arc(0, -2, g.radius, Math.PI, 0);
        ctx.lineTo(g.radius, g.radius);
        for(let i=0;i<4;i++) {
          const wx = g.radius - (i * g.radius/2);
          ctx.quadraticCurveTo(wx - g.radius/4, g.radius+3, wx - g.radius/2, g.radius);
        }
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-2.5, -2.5, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(2.5, -2.5, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#00aaff';
        ctx.beginPath();
        ctx.arc(-2, -2, 1, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(3, -2, 1, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      
      // Mensaje READY! sobre el lienzo (como la imagen)
      if(readyMode && !levelComplete) {
        ctx.font = 'bold 22px "Courier New", monospace';
        ctx.fillStyle = '#ffff88';
        ctx.shadowBlur = 0;
        ctx.shadowColor = '#ffaa33';
        ctx.textAlign = 'center';
        ctx.fillText("READY!", COLS*TILE/2, ROWS*TILE/2 - 20);
        ctx.font = '12px monospace';
        ctx.fillStyle = '#ffcc77';
        ctx.fillText("INSERT COIN", COLS*TILE/2, ROWS*TILE/2 + 20);
        ctx.textAlign = 'left';
      }
      
      if(!running && !levelComplete && lives<=0) {
        ctx.font = 'bold 22px monospace';
        ctx.fillStyle = '#ff5555';
        ctx.textAlign = 'center';
        ctx.fillText("GAME OVER", COLS*TILE/2, ROWS*TILE/2);
      }
    }
    
    // Reinicio completo del juego
    function fullReset() {
      currentLevel = 0;
      PAC_SPEED = 1.28;
      GHOST_SPEED = 0.82;
      GHOST_FRIGHTENED_SPEED = 0.6;
      score = 0;
      lives = 3;
      extraLifeGiven = false;
      levelComplete = false;
      flashWin = false;
      running = true;
      loadLevel(0);
      resetPositions();
      updateUI();
      startReadyState();
      frightenedMode = false;
      document.getElementById('gameStatusMsg').innerHTML = " READY! ";
    }
    
    // Controles de teclado
    function handleKey(e) {
      const key = e.key;
      if(key === 'ArrowUp' || key === 'w' || key === 'W') { inputDir = {x:0, y:-1}; e.preventDefault(); }
      else if(key === 'ArrowDown' || key === 's' || key === 'S') { inputDir = {x:0, y:1}; e.preventDefault(); }
      else if(key === 'ArrowLeft' || key === 'a' || key === 'A') { inputDir = {x:-1, y:0}; e.preventDefault(); }
      else if(key === 'ArrowRight' || key === 'd' || key === 'D') { inputDir = {x:1, y:0}; e.preventDefault(); }
      if(key === 'r' || key === 'R') { fullReset(); e.preventDefault(); }
    }
    
    window.addEventListener('keydown', handleKey);
    document.getElementById('resetGameBtn').addEventListener('click', fullReset);
    
    // Cargar HighScore inicial
    if(localStorage.getItem('pac_high')) highScore = parseInt(localStorage.getItem('pac_high')) || 0;
    function saveHigh() { if(score>highScore) localStorage.setItem('pac_high', highScore); }
    setInterval(saveHigh, 2000);
    
    // Inicializar
    loadLevel(0);
    resetPositions();
    updateUI();
    startReadyState();
    
    // Loop principal
    let lastTimestamp = 0;
    function gameLoop(now) {
      requestAnimationFrame(gameLoop);
      if(!lastTimestamp) { lastTimestamp = now; return; }
      let delta = Math.min(50, now - lastTimestamp);
      if(delta > 0) {
        const steps = Math.max(1, Math.floor(delta / 16));
        for(let i=0;i<steps;i++) updateGame();
      }
      lastTimestamp = now;
      draw();
    }
    requestAnimationFrame(gameLoop);
  })();
</script>
</body>
</html>
